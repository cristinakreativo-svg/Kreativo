function tagTask(task) {
  const t=(typeof task==="object"?task.title:task).toLowerCase();
  if(t.includes("montaj")||t.includes("programeaza")) return {label:"Montaj",bg:"#EEF2EE",color:"#3D5C3D"};
  if(t.includes("factur")||t.includes("avans")) return {label:"Factură",bg:"#F2EEF0",color:"#5C3D50"};
  if(t.includes("ofert")) return {label:"Ofertă",bg:"#EEF0F2",color:"#3D4A5C"};
  if(t.includes("masur")) return {label:"Măsurători",bg:"#F2EEEE",color:"#5C3D3D"};
  if(t.includes("livrat")||t.includes("livrare")) return {label:"Livrare",bg:"#EEF2EE",color:"#3D5040"};
  if(t.includes("telefon")||t.includes("asteapt")) return {label:"Așteptare",bg:"#F2F2EE",color:"#505050"};
  return {label:"Comandă",bg:"#EEF0F2",color:"#3D485C"};
}

const tmrw=()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);};
const fmtD=s=>{if(!s)return"";const[y,m,d]=s.split("-");return`${d}.${m}.${y}`;};
const isOvd=(dl,done)=>!!(dl&&!done&&dl<tday());
const isToday=s=>s===tday();
const daysTo=s=>{if(!s)return null;return Math.ceil((new Date(s)-new Date(tday()))/86400000);};

function nxtRecur(r) {
  const now=new Date(),t=tday();
  if(r.type==="lunar_zi"){
    const day=parseInt(r.day);
    // Incearca luna curenta
    let d=new Date(now.getFullYear(),now.getMonth(),day);
    // Daca ziua a depasit luna (ex: ziua 31 in feb), JavaScript o muta automat - normalizam
    if(d.getMonth()!==now.getMonth()) d=new Date(now.getFullYear(),now.getMonth()+1,0); // ultima zi a lunii
    if(d.toISOString().slice(0,10)<=t){
      // Trecem la luna urmatoare
      d=new Date(now.getFullYear(),now.getMonth()+1,day);
      if(d.getMonth()!==now.getMonth()+1&&d.getMonth()!==0) d=new Date(now.getFullYear(),now.getMonth()+2,0);
    }
    return d.toISOString().slice(0,10);
  }
  if(r.type==="lunar_inceput"){let d=new Date(now.getFullYear(),now.getMonth(),1);if(d.toISOString().slice(0,10)<=t)d=new Date(now.getFullYear(),now.getMonth()+1,1);return d.toISOString().slice(0,10);}
  if(r.type==="lunar_sfarsit"){let d=new Date(now.getFullYear(),now.getMonth()+1,0);if(d.toISOString().slice(0,10)<=t)d=new Date(now.getFullYear(),now.getMonth()+2,0);return d.toISOString().slice(0,10);}
  if(r.type==="saptamanal"){const dm={"Luni":1,"Marți":2,"Miercuri":3,"Joi":4,"Vineri":5,"Sâmbătă":6,"Duminică":0};const target=dm[r.day]??1;let d=new Date(now);d.setDate(d.getDate()+((target-d.getDay()+7)%7||7));return d.toISOString().slice(0,10);}
  return tmrw();
}

function impactScore(task,cat,prio) {
  let s=0;
  if(prio==="Urgent")s+=40;else if(prio==="Normal")s+=20;
  if(cat==="Benjamin Moore"||cat==="Kreativo")s+=30;
  const t=(task||"").toLowerCase();
  if(t.includes("b2b")||t.includes("arhitect"))s+=25;
  if(t.includes("factur")||t.includes("plat"))s+=20;
  if(t.includes("campanie")||t.includes("ads"))s+=15;
  if(t.includes("ofert"))s+=10;
  return s;
}

function LogDiscutii({id,log,setLog,C,inp,btnP,gid,tday,fmtD}){
  const [open,setOpen]=React.useState(false);
  const [text,setText]=React.useState("");
  const entries=(log[id]||[]).slice().reverse();
  const addEntry=()=>{
    if(!text.trim()) return;
    const now=new Date();
    const ora=now.toLocaleTimeString("ro-RO",{hour:"2-digit",minute:"2-digit"});
    setLog(p=>({...p,[id]:[...(p[id]||[]),{id:Date.now().toString(),text:text.trim(),data:tday(),ora}]}));
    setText("");
  };
  const delEntry=(eid)=>setLog(p=>({...p,[id]:(p[id]||[]).filter(e=>e.id!==eid)}));
  return <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:open?10:0}}>
      <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,cursor:"pointer"}} onClick={()=>setOpen(!open)}>
        Discuții {entries.length>0&&<span style={{background:C.accentLight,color:C.accent,padding:"1px 6px",borderRadius:10,fontSize:10,marginLeft:4}}>{entries.length}</span>}
        <span style={{marginLeft:6,fontSize:10}}>{open?"▾":"▸"}</span>
      </div>
      {!open&&entries.length>0&&<span style={{fontSize:11,color:C.textMuted}}>{fmtD(entries[0].data)} — {entries[0].text.slice(0,40)}{entries[0].text.length>40?"...":""}</span>}
    </div>
    {open&&<div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEntry()} placeholder="Notează ce s-a discutat..." style={{...inp,flex:1,padding:"6px 10px",fontSize:12}}/>
        <button onClick={addEntry} style={{...btnP(),fontSize:11,padding:"6px 14px"}}>+ Adaugă</button>
      </div>
      {entries.length===0&&<div style={{fontSize:12,color:C.textMuted,textAlign:"center",padding:"0.5rem"}}>Nicio discuție notată.</div>}
      {entries.map(e=><div key={e.id} style={{display:"flex",gap:8,padding:"8px 10px",background:C.bg,borderRadius:8,marginBottom:4,alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:C.text}}>{e.text}</div>
          <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{fmtD(e.data)} · {e.ora}</div>
        </div>
        <button onClick={()=>delEntry(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.textMuted,fontSize:13,flexShrink:0}}>×</button>
      </div>)}
    </div>}
  </div>;
}

            {furnizori.map(f=><option key={f} value={f}>{f}</option>)}

      <div><div style={{fontSize:10,color:C2.textMuted,marginBottom:3}}>Valoare (RON)</div>

function CashFlowTab({trezorerie,setTrezorerie,bilete,setBilete,furnizoriLista,setFurnizoriLista,C,card,inp,btnP,btnS,row,fmtD,tday,gid,daysTo}){
  const [sectiune,setSectiune]=React.useState("registru");
  const [showForm,setShowForm]=React.useState(null); // null | {data, tip}
  const [formData,setFormData]=React.useState({descriere:"",suma:""});
  const [editId,setEditId]=React.useState(null);
  const [editData,setEditData]=React.useState({descriere:"",suma:"",data:""});
  const [showAddRec,setShowAddRec]=React.useState(false);
  const [newRec,setNewRec]=React.useState({denumire:"",suma:"",ziua:"15"});

  const updT=(f,v)=>setTrezorerie(t=>({...t,[f]:v}));
  const inreg=trezorerie.inregistrari||[];
  const recurente=trezorerie.recurente||[];
  const soldInit=Number(trezorerie.soldInitial||0);

  const adaugaInreg=(data,tip)=>{
    if(!formData.suma) return;
    updT("inregistrari",[...inreg,{id:gid(),descriere:formData.descriere,suma:Number(formData.suma),data,tip}]);
    setFormData({descriere:"",suma:""});setShowForm(null);
  };
  const stergeInreg=(id)=>updT("inregistrari",inreg.filter(x=>x.id!==id));
  const salveazaEdit=(id)=>{
    updT("inregistrari",inreg.map(x=>x.id!==id?x:{...x,descriere:editData.descriere,suma:Number(editData.suma),data:editData.data||x.data}));
    setEditId(null);
  };
  const adaugaRec=()=>{
    if(!newRec.denumire||!newRec.suma) return;
    updT("recurente",[...recurente,{id:gid(),...newRec,suma:Number(newRec.suma)}]);
    setNewRec({denumire:"",suma:"",ziua:"15"});setShowAddRec(false);
  };

  // Construieste zilele
  const getZile=()=>{
    const zile=[];
    let sold=soldInit;
    for(let i=-3;i<90;i++){
      const d=new Date();d.setDate(d.getDate()+i);
      const ds=d.toISOString().slice(0,10);
      const zi=d.getDate();
      const soldZiStart=sold;
      const incasariZi=inreg.filter(x=>x.data===ds&&x.tip==="incasare");
      const platiZi=inreg.filter(x=>x.data===ds&&x.tip==="plata");
      const bileteZi=bilete.filter(b=>!b.achitat&&b.scadenta===ds);
      const recZi=recurente.filter(r=>parseInt(r.ziua)===zi);
      const totalIn=incasariZi.reduce((s,x)=>s+x.suma,0);
      const totalOut=platiZi.reduce((s,x)=>s+x.suma,0)+bileteZi.reduce((s,b)=>s+Number(b.valoare||0),0)+recZi.reduce((s,r)=>s+r.suma,0);
      sold=sold+totalIn-totalOut;
      zile.push({data:ds,soldStart:soldZiStart,soldEnd:sold,totalIn,totalOut,incasariZi,platiZi,bileteZi,recZi,
        label:d.toLocaleDateString("ro-RO",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}),
        isAzi:ds===tday(),isTrecut:ds<tday()});
    }
    return zile;
  };
  const zile=getZile();
  const soldAzi=zile.find(z=>z.isAzi)?.soldEnd||soldInit;
  const primaZiNeg=zile.find(z=>z.soldEnd<0&&!z.isTrecut);
  const inpS={...inp,padding:"6px 10px",fontSize:13};

  return <div>
    <div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600,marginBottom:12}}>Cash Flow · Registru zilnic</div>

    {primaZiNeg&&<div style={{padding:"10px 14px",background:C.dangerLight,border:`1px solid #C0A0A0`,borderRadius:10,marginBottom:10,fontSize:13,color:C.danger,fontWeight:500}}>
      ⚠️ Sold negativ previzionat pe {primaZiNeg.label}: {primaZiNeg.soldEnd.toLocaleString("ro-RO")} RON
    </div>}
    {bilete.filter(b=>!b.achitat&&b.scadenta&&daysTo(b.scadenta)<=7&&daysTo(b.scadenta)>=0).map(b=>(
      <div key={b.id} style={{padding:"8px 14px",background:C.warnLight,border:`1px solid #C8A870`,borderRadius:10,marginBottom:6,fontSize:12,color:C.warn}}>
        ⏰ Bilet #{b.numar} · {b.furnizor} · {Number(b.valoare).toLocaleString("ro-RO")} RON — scadent {fmtD(b.scadenta)}
      </div>
    ))}

    {/* Sold initial + sold azi */}
    <div style={{...card,marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <div>
          <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Sold inițial</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <input type="number" value={trezorerie.soldInitial||0} onChange={e=>updT("soldInitial",Number(e.target.value))} style={{...inpS,width:130}}/>
            <span style={{fontSize:12,color:C.textMuted}}>RON</span>
          </div>
        </div>
        <div style={{flex:1}}/>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Sold azi</div>
          <div style={{fontSize:26,fontWeight:700,color:soldAzi<0?C.danger:C.accent}}>{soldAzi.toLocaleString("ro-RO")} RON</div>
        </div>
      </div>
    </div>

    {/* Sectiuni */}
    <div style={{display:"flex",gap:6,marginBottom:14}}>
      {[["registru","Registru"],["bilete","Bilete la ordin"],["recurente","Recurente"]].map(([id,l])=>
        <button key={id} onClick={()=>setSectiune(id)} style={{padding:"7px 14px",border:`1px solid ${sectiune===id?C.accent:C.border}`,borderRadius:8,background:sectiune===id?C.accentLight:"transparent",color:sectiune===id?C.accent:C.textSub,cursor:"pointer",fontSize:12,fontWeight:sectiune===id?500:400}}>{l}</button>
      )}
    </div>

    {/* REGISTRU ZILNIC */}
    {sectiune==="registru"&&<div>
      {zile.filter(z=>!z.isTrecut||z.totalIn>0||z.totalOut>0||z.isAzi).map(z=>(
        <div key={z.data} style={{...card,marginBottom:10,opacity:z.isTrecut&&!z.isAzi?0.7:1,border:z.isAzi?`2px solid ${C.accent}`:`1px solid ${C.border}`}}>

          {/* Header zi */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:z.isAzi?C.accent:C.text}}>{z.label}</div>
              <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>Sold la început de zi: <strong style={{color:z.soldStart<0?C.danger:C.textSub}}>{z.soldStart.toLocaleString("ro-RO")} RON</strong></div>
            </div>
            {z.isAzi&&<span style={{fontSize:10,background:C.accent,color:"#fff",padding:"3px 8px",borderRadius:6,fontWeight:600}}>AZI</span>}
          </div>

          {/* ÎNCASĂRI */}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:"#3A6A3A",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,marginBottom:6}}>↓ Încasări</div>
            {z.incasariZi.map(m=><div key={m.id} style={{marginBottom:4}}>
              {editId===m.id?
                <div style={{display:"flex",gap:6,alignItems:"center",padding:"6px 10px",background:"#F2F8F2",borderRadius:8,flexWrap:"wrap"}}>
                  <input value={editData.descriere} onChange={e=>setEditData(x=>({...x,descriere:e.target.value}))} placeholder="Descriere" style={{...inpS,flex:2,minWidth:100}}/>
                  <input type="number" value={editData.suma} onChange={e=>setEditData(x=>({...x,suma:e.target.value}))} style={{...inpS,width:90}}/>
                  <input type="date" value={editData.data} onChange={e=>setEditData(x=>({...x,data:e.target.value}))} style={{...inpS,width:130}}/>
                  <button onClick={()=>salveazaEdit(m.id)} style={{...btnP("#3A6A3A"),fontSize:11,padding:"5px 12px"}}>✓</button>
                  <button onClick={()=>setEditId(null)} style={{...btnS,fontSize:11,padding:"5px 10px"}}>✕</button>
                </div>:
                <div style={{display:"flex",alignItems:"center",padding:"7px 10px",background:"#F5FBF5",borderRadius:8,gap:8}}>
                  <span style={{flex:1,fontSize:13,color:"#2A4A2A"}}>{m.descriere||"—"}</span>
                  <span style={{fontSize:14,fontWeight:700,color:"#2A6A2A",minWidth:140,textAlign:"right"}}>+{m.suma.toLocaleString("ro-RO")} RON</span>
                  <button onClick={()=>{setEditId(m.id);setEditData({descriere:m.descriere,suma:m.suma,data:m.data});}} style={{background:"none",border:"none",cursor:"pointer",color:C.textMuted,fontSize:12,width:16}}>✎</button>
                  <button onClick={()=>stergeInreg(m.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.danger,fontSize:14,width:16}}>×</button>
                </div>
              }
            </div>)}
            {/* Buton adauga incasare */}
            {showForm?.data===z.data&&showForm?.tip==="incasare"?
              <div style={{display:"flex",gap:6,alignItems:"center",padding:"8px 10px",background:"#F2F8F2",borderRadius:8,marginTop:4}}>
                <input autoFocus value={formData.descriere} onChange={e=>setFormData(x=>({...x,descriere:e.target.value}))} placeholder="Client / descriere" style={{...inpS,flex:2}}/>
                <input type="number" value={formData.suma} onChange={e=>setFormData(x=>({...x,suma:e.target.value}))} placeholder="Sumă" style={{...inpS,width:100}}/>
                <button onClick={()=>adaugaInreg(z.data,"incasare")} style={{...btnP("#3A6A3A"),fontSize:11,padding:"5px 12px"}}>✓</button>
                <button onClick={()=>setShowForm(null)} style={{...btnS,fontSize:11,padding:"5px 10px"}}>✕</button>
              </div>:
              <button onClick={()=>{setShowForm({data:z.data,tip:"incasare"});setFormData({descriere:"",suma:"",});}} style={{fontSize:11,color:"#3A6A3A",border:"1px dashed #90C090",borderRadius:6,padding:"4px 12px",background:"transparent",cursor:"pointer",marginTop:4}}>+ adaugă încasare</button>
            }
            {z.totalIn>0&&<div style={{textAlign:"right",fontSize:12,fontWeight:700,color:"#2A6A2A",marginTop:6,paddingTop:6,borderTop:"1px solid #D0E8D0"}}>Total încasări: +{z.totalIn.toLocaleString("ro-RO")} RON</div>}
          </div>

          {/* PLĂȚI */}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:C.danger,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,marginBottom:6}}>↑ Plăți</div>
            {z.platiZi.map(m=><div key={m.id} style={{marginBottom:4}}>
              {editId===m.id?
                <div style={{display:"flex",gap:6,alignItems:"center",padding:"6px 10px",background:C.dangerLight,borderRadius:8,flexWrap:"wrap"}}>
                  <input value={editData.descriere} onChange={e=>setEditData(x=>({...x,descriere:e.target.value}))} placeholder="Descriere" style={{...inpS,flex:2,minWidth:100}}/>
                  <input type="number" value={editData.suma} onChange={e=>setEditData(x=>({...x,suma:e.target.value}))} style={{...inpS,width:90}}/>
                  <input type="date" value={editData.data} onChange={e=>setEditData(x=>({...x,data:e.target.value}))} style={{...inpS,width:130}}/>
                  <button onClick={()=>salveazaEdit(m.id)} style={{...btnP(C.danger),fontSize:11,padding:"5px 12px"}}>✓</button>
                  <button onClick={()=>setEditId(null)} style={{...btnS,fontSize:11,padding:"5px 10px"}}>✕</button>
                </div>:
                <div style={{display:"flex",alignItems:"center",padding:"7px 10px",background:"#FBF5F5",borderRadius:8,gap:8}}>
                  <span style={{flex:1,fontSize:13,color:"#4A2A2A"}}>{m.descriere||"—"}</span>
                  <span style={{fontSize:14,fontWeight:700,color:C.danger,minWidth:140,textAlign:"right"}}>-{m.suma.toLocaleString("ro-RO")} RON</span>
                  <button onClick={()=>{setEditId(m.id);setEditData({descriere:m.descriere,suma:m.suma,data:m.data});}} style={{background:"none",border:"none",cursor:"pointer",color:C.textMuted,fontSize:12,width:16}}>✎</button>
                  <button onClick={()=>stergeInreg(m.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.danger,fontSize:14,width:16}}>×</button>
                </div>
              }
            </div>)}
            {/* Bilete scadente */}
            {z.bileteZi.map(b=><div key={b.id} style={{marginBottom:4}}>
              {editId===b.id?
                <div style={{display:"flex",gap:6,alignItems:"center",padding:"6px 10px",background:C.dangerLight,borderRadius:8,flexWrap:"wrap"}}>
                  <input value={editData.descriere} onChange={e=>setEditData(x=>({...x,descriere:e.target.value}))} placeholder="Furnizor" style={{...inpS,flex:2,minWidth:100}}/>
                  <input type="number" value={editData.suma} onChange={e=>setEditData(x=>({...x,suma:e.target.value}))} style={{...inpS,width:90}}/>
                  <input type="date" value={editData.data} onChange={e=>setEditData(x=>({...x,data:e.target.value}))} style={{...inpS,width:130}}/>

                  <button onClick={()=>setEditId(null)} style={{...btnS,fontSize:11,padding:"5px 10px"}}>✕</button>
                </div>:
                <div style={{display:"flex",alignItems:"center",padding:"7px 10px",background:"#FBF5F5",borderRadius:8,gap:8}}>

          <div style={{flex:2,minWidth:120}}>

            <input type="number" min="1" max="31" value={r.ziua} onChange={e=>updT("recurente",recurente.map(x=>x.id!==r.id?x:{...x,ziua:e.target.value}))} style={{width:50,fontSize:12,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 6px",outline:"none",textAlign:"center",background:C.surface}}/>

    </div>}
  </div>;
}


function AddFacturaForm({motoare, onAdd}){
  const [open,setOpen]=React.useState(false);
  const [furnizor,setFurnizor]=React.useState("");
  const [factura,setFactura]=React.useState("");
  const [data,setData]=React.useState(new Date().toISOString().slice(0,10));
  const [pozitii,setPozitii]=React.useState([{id:"p1",model:motoare[0]?.model||"",qty:1}]);
  const C2={bg:"#F2EFE9",surface:"#FAF8F4",border:"#E0D8CC",text:"#2A2118",textMuted:"#A8998A"};
  const addPoz=()=>setPozitii(p=>[...p,{id:Date.now().toString(),model:motoare[0]?.model||"",qty:1}]);
  const updPoz=(id,f,v)=>setPozitii(p=>p.map(pz=>pz.id!==id?pz:{...pz,[f]:f==="qty"?parseInt(v)||1:v}));
  const delPoz=(id)=>setPozitii(p=>p.filter(pz=>pz.id!==id));
  const handleSave=()=>{
    if(pozitii.length===0) return;
    onAdd({furnizor:furnizor||"Furnizor necunoscut",factura,data,pozitii:[...pozitii]});
    setFurnizor("");setFactura("");setData(new Date().toISOString().slice(0,10));
    setPozitii([{id:"p1",model:motoare[0]?.model||"",qty:1}]);
    setOpen(false);
  };
  if(!open) return <button onClick={()=>setOpen(true)} style={{width:"100%",padding:"11px",fontSize:12,color:"#3A6A3A",border:"1.5px dashed #90C090",borderRadius:10,background:"#F2F8F2",cursor:"pointer",fontWeight:500,marginBottom:16}}>+ Înregistrează intrare nouă (factură)</button>;
  return <div style={{background:"#F2F8F2",border:"1.5px solid #90C090",borderRadius:12,padding:"16px",marginBottom:16}}>
    <div style={{fontSize:11,color:"#3A6A3A",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:12}}>Intrare nouă · Factură</div>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
      <div style={{flex:2,minWidth:120}}><div style={{fontSize:10,color:C2.textMuted,marginBottom:3}}>Furnizor *</div>
        <input value={furnizor} onChange={e=>setFurnizor(e.target.value)} placeholder="ex: Coulisse" style={{width:"100%",fontSize:13,border:`1px solid ${C2.border}`,borderRadius:6,padding:"6px 10px",outline:"none",background:C2.surface}}/></div>
      <div style={{flex:2,minWidth:120}}><div style={{fontSize:10,color:C2.textMuted,marginBottom:3}}>Nr. factură</div>
        <input value={factura} onChange={e=>setFactura(e.target.value)} placeholder="ex: F2024-001" style={{width:"100%",fontSize:13,border:`1px solid ${C2.border}`,borderRadius:6,padding:"6px 10px",outline:"none",background:C2.surface}}/></div>
      <div><div style={{fontSize:10,color:C2.textMuted,marginBottom:3}}>Data</div>
        <input type="date" value={data} onChange={e=>setData(e.target.value)} style={{fontSize:13,border:`1px solid ${C2.border}`,borderRadius:6,padding:"6px 10px",outline:"none",background:C2.surface}}/></div>
    </div>
    <div style={{fontSize:10,color:C2.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600,marginBottom:8}}>Poziții</div>
    {pozitii.map((pz,i)=><div key={pz.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
      <select value={pz.model} onChange={e=>updPoz(pz.id,"model",e.target.value)} style={{fontSize:13,border:`1px solid ${C2.border}`,borderRadius:6,padding:"6px 8px",background:C2.surface,outline:"none",flex:1}}>
        {motoare.map(m=><option key={m.model} value={m.model}>{m.model}</option>)}
      </select>
      <input type="number" min="1" value={pz.qty} onChange={e=>updPoz(pz.id,"qty",e.target.value)} style={{width:70,fontSize:13,border:`1px solid ${C2.border}`,borderRadius:6,padding:"6px 8px",outline:"none",textAlign:"center"}}/>
      <span style={{fontSize:12,color:C2.textMuted}}>buc.</span>
      {pozitii.length>1&&<button onClick={()=>delPoz(pz.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#C07070",fontSize:16,padding:"0 4px"}}>×</button>}
    </div>)}
    <button onClick={addPoz} style={{fontSize:11,color:"#3A6A3A",border:"1px dashed #90C090",borderRadius:6,padding:"4px 12px",background:"transparent",cursor:"pointer",marginBottom:12}}>+ adaugă poziție</button>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
      <button onClick={()=>setOpen(false)} style={{padding:"7px 16px",border:`1px solid ${C2.border}`,borderRadius:6,background:"transparent",cursor:"pointer",fontSize:12,color:C2.textMuted}}>Anulează</button>
      <button onClick={handleSave} style={{padding:"7px 20px",border:"none",borderRadius:6,background:"#3A6A3A",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:500}}>Salvează factura</button>
    </div>
  </div>;
}

function App() {
  const [tab,setTab]=useState("focus");
  const [data,setData]=useState({tasks:[],notes:[],events:[]});
  const [admin,setAdmin]=useState({contabilitate:[],administrativ:[],marketing:[],personal:[]});
  const [clients,setClients]=useState([]);
  const [perdele,setPerdele]=useState(PP);
  const [motoare,setMotoare]=useState(MOTOARE_INIT.map(m=>({...m})));
  const [iesiri,setIesiri]=useState([]);
  const [intrari,setIntrari]=useState([]);
  const [bilete,setBilete]=useState([]);
  const [trezorerie,setTrezorerie]=useState({soldInitial:0,incasari:[],plati:[],recurente:[]});
  const [furnizoriLista,setFurnizoriLista]=useState(["Coulisse","Benjamin Moore","Darstar","Duval"]);
  const [oferte,setOferte]=useState([]);
  const [log,setLog]=useState({});
  const [ofertaSubtab,setOfertaSubtab]=useState("lista"); // {clientId: [{text, data, ora}]}
  const [chat,setChat]=useState([]);
  const [chatInput,setChatInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [mit,setMit]=useState({task:"",date:tday(),done:false});
  const [jurnal,setJurnal]=useState({});
  const [planMaine,setPlanMaine]=useState({});
  const [recurente,setRecurente]=useState([]);
  const [showEvForm,setShowEvForm]=useState(false);
  const [showRecForm,setShowRecForm]=useState(false);
  const [evForm,setEvForm]=useState({title:"",date:tday(),time:"",loc:""});
  const [recForm,setRecForm]=useState({title:"",type:"lunar_zi",day:"25",cat:"Contabilitate"});
  const [newTask,setNewTask]=useState({});
  const [addingTo,setAddingTo]=useState(null);
  const [search,setSearch]=useState("");
  const [cliFilter,setCliFilter]=useState("all");
  const [addingCli,setAddingCli]=useState(false);
  const [newCliName,setNewCliName]=useState("");
  const [openEtapa,setOpenEtapa]=useState({0:true,1:false,2:false});
  const [newPlan,setNewPlan]=useState("");
  const [newMotorModel,setNewMotorModel]=useState("");
  const [openModel,setOpenModel]=useState({});
  const [loaded, setLoaded] = useState(false);
  const chatRef=useRef(null);
  const saveTimer=useRef({});

  const sbGet=async(key)=>{
    try{const{data}=await sb.from("kreativo_data").select("value").eq("key",key).single();return data?.value?JSON.parse(data.value):null;}catch{return null;}
  };
  const sbSet=async(key,value)=>{
    try{await sb.from("kreativo_data").upsert({key,value:JSON.stringify(value)},{onConflict:"key"});}catch(e){console.log(e);}
  };
  const sbSave=(key,value)=>{
    if(saveTimer.current[key]) clearTimeout(saveTimer.current[key]);
    saveTimer.current[key]=setTimeout(()=>sbSet(key,value),800);
  };

  useEffect(()=>{
    async function load(){
      try{
        const timeout = new Promise((_,reject)=>setTimeout(()=>reject(new Error("timeout")),12000));
        const loadData = async()=>{
          const d=await sbGet(SK); if(d) setData(d);
          const cl=await sbGet(CLK);
          if(cl) setClients(cl);
          const ad=await sbGet(AK); if(ad) setAdmin({contabilitate:[],administrativ:[],marketing:[],personal:[],...ad});
          const pe=await sbGet(PK); if(pe) setPerdele(pe);
          const m=await sbGet(MIK); if(m) setMit(m);
          const j=await sbGet(JK); if(j) setJurnal(j);
          const pl=await sbGet(PLK); if(pl) setPlanMaine(pl);
          const r=await sbGet(RK); if(r) setRecurente(r);
          const mo=await sbGet(MOK); if(mo) setMotoare(mo);
          const ie=await sbGet(IEK); if(ie) setIesiri(ie);
          const intr=await sbGet(INK); if(intr) setIntrari(intr);
          const bl=await sbGet(BLK); if(bl) setBilete(bl);
          const of=await sbGet(OFK); if(of) setOferte(of);
          const lg=await sbGet(LGK); if(lg) setLog(lg);
          const tr=await sbGet(TRK); if(tr) setTrezorerie(tr);
        };
        await Promise.race([loadData(), timeout]);
      }catch(e){
        console.log("Load error:",e);
      }
      setLoaded(true);
    }
    load();
  },[]);

  useEffect(()=>{if(loaded) sbSave(SK,data);},[data,loaded]);
  useEffect(()=>{if(loaded) sbSave(CLK,clients);},[clients,loaded]);
  useEffect(()=>{if(loaded) sbSave(AK,admin);},[admin,loaded]);
  useEffect(()=>{if(loaded) sbSave(PK,perdele);},[perdele,loaded]);
  useEffect(()=>{if(loaded) sbSave(MIK,mit);},[mit,loaded]);
  useEffect(()=>{if(loaded) sbSave(JK,jurnal);},[jurnal,loaded]);
  useEffect(()=>{if(loaded) sbSave(PLK,planMaine);},[planMaine,loaded]);
  useEffect(()=>{if(loaded) sbSave(RK,recurente);},[recurente,loaded]);
  useEffect(()=>{if(loaded) sbSave(MOK,motoare);},[motoare,loaded]);
  useEffect(()=>{if(loaded) sbSave(IEK,iesiri);},[iesiri,loaded]);
  useEffect(()=>{if(loaded) sbSave(INK,intrari);},[intrari,loaded]);
  useEffect(()=>{if(loaded) sbSave(BLK,bilete);},[bilete,loaded]);
  useEffect(()=>{if(loaded) sbSave(OFK,oferte);},[oferte,loaded]);
  useEffect(()=>{if(loaded) sbSave(LGK,log);},[log,loaded]);
  useEffect(()=>{if(loaded) sbSave(TRK,trezorerie);},[trezorerie,loaded]);

  useEffect(()=>{if(chatRef.current) chatRef.current.scrollIntoView({behavior:"smooth"});},[chat,loading]);

  const addJurnal=(title,source)=>{
    const t=tday();
    setJurnal(j=>{const ex=j[t]||[];if(ex.find(e=>e.title===title&&e.source===source)) return j;return {...j,[t]:[...ex,{title,source,time:new Date().toLocaleTimeString("ro-RO",{hour:"2-digit",minute:"2-digit"})}]};});
  };

  const saveEv=()=>{if(!evForm.title.trim()) return;setData(d=>({...d,events:[{id:gid(),...evForm},...d.events].sort((a,b)=>(a.date+a.time)>(b.date+b.time)?1:-1)}));setEvForm({title:"",date:tday(),time:"",loc:""});setShowEvForm(false);};
  const delEv=(id)=>setData(d=>({...d,events:d.events.filter(e=>e.id!==id)}));

  const addMotorCli=(ci,model,qty)=>{if(!model||!qty||qty<=0) return;setClients(p=>p.map((c,i)=>{if(i!==ci) return c;const mo=[...(c.motoare||[])];const idx=mo.findIndex(m=>m.model===model);if(idx>=0)mo[idx]={...mo[idx],qty:mo[idx].qty+qty};else mo.push({model,qty});return {...c,motoare:mo};}));};

                  <div><span style={{padding:"2px 7px",borderRadius:10,fontSize:10,fontWeight:600,background:e.tip==="intrare"?"#EAF2EA":"#F5EEEE",color:e.tip==="intrare"?"#3A6A3A":C.danger}}>{e.tip==="intrare"?"↓ IN":"↑ OUT"}</span></div>
                  <div style={{fontSize:12,color:C.text,fontWeight:500}}>{e.sursa||"—"}</div>
                  <div style={{fontSize:13,fontWeight:600,color:e.tip==="intrare"?"#3A6A3A":C.danger}}>{e.tip==="intrare"?"+":"-"}{e.qty}</div>
                  <div style={{fontSize:11,color:C.textMuted}}>{e.factura||"—"}</div>
                </div>)}
              </div>
            </div>}
            {alocat>0&&<div style={{marginTop:12,padding:"10px 14px",background:C.accentLight,borderRadius:8}}>
              <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Alocat clienți activi</div>
              {clients.filter(c=>(c.motoare||[]).find(x=>x.model===m.model)).map(c=>{const mx=c.motoare.find(x=>x.model===m.model);return <div key={c.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}><span style={{flex:1,fontSize:12,color:C.text}}>{c.name}</span><span style={{fontSize:12,fontWeight:600,color:C.accent}}>{mx.qty} buc.</span></div>;})}
            </div>}
            <button onClick={()=>delMotorModel(m.model)} style={{marginTop:12,fontSize:11,color:C.textMuted,border:"none",background:"transparent",cursor:"pointer"}}>× șterge model</button>
          </div>}
        </div>;
      })}

      <div style={{marginTop:8}}>
        <div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600,marginBottom:8}}>Adaugă model nou</div>
        <div style={{display:"flex",gap:8}}>
          <input value={newMotorModel} onChange={e=>setNewMotorModel(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&addMotorModel()} placeholder="Ex: CM-60" style={{...inp,flex:1}}/>
          <button style={btnP()} onClick={addMotorModel}>+ Adaugă</button>
        </div>
      </div>
    </div>}

    {tab==="contabilitate"&&<div><div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:16,fontWeight:600}}>Contabilitate</div><SimpleTab section="contabilitate" ph="Adaugă sarcină..."/></div>}
    {tab==="administrativ"&&<div><div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:16,fontWeight:600}}>Administrativ</div><SimpleTab section="administrativ" ph="Adaugă sarcină..."/></div>}
    {tab==="marketing"&&<div><div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:16,fontWeight:600}}>Marketing</div><SimpleTab section="marketing" ph="Adaugă sarcină..."/></div>}
    {tab==="personal"&&<div><div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:16,fontWeight:600}}>Personal</div><SimpleTab section="personal" ph="Adaugă sarcină personală..."/></div>}

    {tab==="perdele"&&<div>
      <div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600,marginBottom:4}}>Plan Dezvoltare · Perdele & Smart Shading</div>
      <PBar pct={perdele.reduce((s,e)=>s+e.taskuri.length,0)?Math.round(perdele.reduce((s,e)=>s+e.taskuri.filter(t=>t.done).length,0)/perdele.reduce((s,e)=>s+e.taskuri.length,0)*100):0} color="#4A6070"/>
      <div style={{marginTop:16}}>
        {perdele.map((etapa,ei)=>{
          const dE=etapa.taskuri.filter(t=>t.done).length,tE=etapa.taskuri.length,pE=tE?Math.round(dE/tE*100):0,isOpen=openEtapa[ei];
          const sorted=[...etapa.taskuri].sort((a,b)=>{if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return -1;return a.deadline>b.deadline?1:-1;});
          return <div key={ei} style={{border:`1px solid ${C.border}`,borderRadius:12,marginBottom:10,overflow:"hidden",background:C.surface}}>
            <div onClick={()=>setOpenEtapa(p=>({...p,[ei]:!p[ei]}))} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",cursor:"pointer",userSelect:"none"}}>
              <div style={{width:40,height:40,borderRadius:8,background:etapa.color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:13,fontWeight:300,color:"rgba(255,255,255,0.9)"}}>{pE}%</span></div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:C.text}}>{etapa.titlu}</div><div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{etapa.period} · {dE}/{tE}</div></div>
              <div style={{fontSize:11,color:C.textMuted}}>{isOpen?"▾":"▸"}</div>
            </div>
            {isOpen&&<div style={{padding:"4px 16px 16px"}}>
              <div style={{background:C.border,height:"1px",marginBottom:12}}/>
              {sorted.map(t=>{
                const ov=t.deadline&&!t.done&&t.deadline<tday();
                return <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.bg}`,opacity:t.done?0.45:1}}>
                  <input type="checkbox" checked={t.done} onChange={()=>togP(ei,t.id)} style={{cursor:"pointer",width:15,height:15,marginTop:3,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,color:t.done?C.textMuted:C.text,textDecoration:t.done?"line-through":"none",lineHeight:1.55,marginBottom:8}}>{t.text}</div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11,color:C.textMuted}}>Resp.</span><input value={t.resp||""} onChange={e=>updP(ei,t.id,"resp",e.target.value)} style={{...inp,width:140,padding:"3px 8px",fontSize:12,color:etapa.color,fontWeight:500}}/></div>
                      <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11,color:C.textMuted}}>Termen</span><input type="date" value={t.deadline||""} onChange={e=>updP(ei,t.id,"deadline",e.target.value)} style={{...inp,width:"auto",padding:"3px 8px",fontSize:12,color:ov?C.danger:C.text}}/></div>
                      {ov&&<span style={{fontSize:11,color:C.danger,fontWeight:500}}>Depășit</span>}
                    </div>
                  </div>
                </div>;
              })}
            </div>}
          </div>;
        })}
      </div>
    </div>}

    {tab==="vopsele"&&<div style={{textAlign:"center",padding:"4rem 1rem"}}>
      <div style={{fontSize:13,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>În construcție</div>
      <div style={{fontSize:20,fontWeight:300,color:C.text,marginBottom:8}}>Plan Dezvoltare Vopsele</div>
      <div style={{fontSize:13,color:C.textMuted,maxWidth:360,margin:"0 auto",lineHeight:1.7}}>Planul pentru Benjamin Moore — sesiune dedicată.</div>
    </div>}

    {tab==="trezorerie"&&<CashFlowTab trezorerie={trezorerie} setTrezorerie={setTrezorerie} bilete={bilete} setBilete={setBilete} furnizoriLista={furnizoriLista} setFurnizoriLista={setFurnizoriLista} C={C} card={card} inp={inp} btnP={btnP} btnS={btnS} row={row} fmtD={fmtD} tday={tday} gid={gid} daysTo={daysTo}/> }

    {tab==="chat"&&<div>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:14,textTransform:"uppercase",letterSpacing:"0.06em"}}>Asistentă · prioritizare · execuție</div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,minHeight:280,maxHeight:400,overflowY:"auto",padding:16,marginBottom:12,display:"flex",flexDirection:"column",gap:10}}>
        {chat.length===0&&<div style={{color:C.textMuted,fontSize:13,textAlign:"center",marginTop:"3rem",lineHeight:1.7}}>Ce faci <strong>mai întâi</strong> azi?<br/><span style={{fontSize:12}}>Sau scrie "bună dimineața" să stabilim top 3 împreună.</span></div>}
        {chat.map((m,i)=><div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"80%"}}>
          <div style={{background:m.role==="user"?C.accent:C.bg,color:m.role==="user"?"#fff":C.text,border:m.role==="assistant"?`1px solid ${C.border}`:"none",borderRadius:10,padding:"10px 14px",fontSize:13,lineHeight:1.6}}>{m.content}</div>
        </div>)}
        {loading&&<div style={{alignSelf:"flex-start"}}><div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",fontSize:13,color:C.textMuted}}>···</div></div>}
        <div ref={chatRef}/>
      </div>
      <div style={row}>
        <input style={{...inp,flex:1}} value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder="Ce faci acum? Ce te blochează?"/>
        <button style={btnP()} onClick={sendChat} disabled={loading}>{loading?"···":"Trimite"}</button>
      </div>
      <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
        {["Bună dimineața, stabilim top 3","Ce am amânat?","Ce pot delega azi?"].map(s=><button key={s} style={{fontSize:11,padding:"5px 10px",border:`1px solid ${C.border}`,borderRadius:6,background:"transparent",cursor:"pointer",color:C.textSub}} onClick={()=>setChatInput(s)}>{s}</button>)}
      </div>
    </div>}

    </div>
  </div>;
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>
